services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Jwt__Key=${JWT_KEY:-FunctionFlowDevKey_ChangeInProduction_MinLength32Chars!}
      - Smtp__Host=${SMTP_HOST:-smtp.gmail.com}
      - Smtp__Port=${SMTP_PORT:-587}
      - Smtp__User=${SMTP_USER:-}
      - Smtp__Pass=${SMTP_PASS:-}
      - Smtp__From=${SMTP_FROM:-}
      - Cors__Origins__0=http://localhost
      - Cors__Origins__1=http://localhost:3000
    volumes:
      - app-data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  app-data:
