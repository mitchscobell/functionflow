services:
  backend:
    build: ./backend
    ports:
      - "4001:5000"
    expose:
      - "5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Jwt__Key=${JWT_KEY:?JWT_KEY must be set for production}
      - Smtp__Host=${SMTP_HOST:-}
      - Smtp__Port=${SMTP_PORT:-587}
      - Smtp__User=${SMTP_USER:-}
      - Smtp__Pass=${SMTP_PASS:-}
      - Smtp__From=${SMTP_FROM:-}
      - AdminNotify__Email=${ADMIN_EMAIL:-}
      - DemoCleanup__MaxAgeHours=${DEMO_MAX_AGE_HOURS:-24}
      - DemoCleanup__IntervalMinutes=${DEMO_INTERVAL_MINUTES:-30}
      - Cors__Origins__0=${CORS_ORIGIN:?CORS_ORIGIN must be set for production}
    volumes:
      - app-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/api/version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "4000:8080"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

volumes:
  app-data:
